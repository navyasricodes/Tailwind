<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login</title>
    <style>
      body {
        background-color: pink;
      }
    </style>
    <link rel="stylesheet" href="../output.css" />
  </head>
  <body
    class="bg-pink-200 flex justify-center items-center text-center min-h-screen"
  >
    <div
      class="bg-sky-500 p-6 w-96 rounded-lg"
      style="width: 600px; height: 250px; padding: 4px"
    >
      <h1
        style="
          padding-bottom: 12px;
          padding: 20px 30px 30px 30px;
          font-weight: bold;
          font-size: xxx-large;
          color: brown;
        "
      >
        login
      </h1>
      <form class="flex flex-col gap-4">
        <div class="flex gap-2 items-center justify-center">
          <label style="font-size: x-large" for="email">email:</label>
          <input
            style="border: 2px solid #8b3232"
            type="email"
            name="email"
            id=""
          />
        </div>
        <div class="flex gap-2 items-center justify-center">
          <label for="password">password:</label>
          <input type="password" name="password" id="" />
        </div>
        <button type="submit">login</button>
      </form>
    </div>
  </body>
</html>
